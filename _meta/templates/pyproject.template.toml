[project]
  description     = "${PYPROJECT_DESCRIPTION}"
  name            = "${PYPROJECT_NAME}"
  readme          = "README.md"
  requires-python = ">=3.13"
  version         = "${PYPROJECT_VERSION}"

  authors = [
    { email = "developer.xat0h@mail-sl.blockmage.dev", name = "Blockmage Developer" },
  ]

  maintainers = [
    { email = "developer.xat0h@mail-sl.blockmage.dev", name = "Blockmage Developer" },
  ]

  dependencies = [
    "anyio>=4.12.0",
    "cachebox>=5.1.0",
    "hishel[httpx]>=1.1.7",
    "msgspec[toml,yaml]>=0.20.0",
    "pydantic-settings>=2.12.0",
    "pydantic>=2.12.5",
    "pyrage-stubs>=1.3.1",
    "pyrage>=1.3.0",
    "structlog>=25.5.0",
    "tyro>=1.0.2",
  ]

  [project.urls]
    github   = "https://github.com/Blockmage/${PYPROJECT_NAME}"
    homepage = "https://blockmage.dev"

[dependency-groups]
  dev = [
    "anyio>=4.12.0",
    "commitizen>=4.10.1",
    "coverage>=7.13.0",
    "devtools>=0.12.2",
    "ipykernel>=7.1.0",
    "ipywidgets>=8.1.8",
    "polylith-cli>=1.40.0",
    "pyright>=1.1.407",
  ]

  docs = [
    "mkdocs-gen-files>=0.5.0",
    "mkdocs-literate-nav>=0.6.0",
    "mkdocs-material>=9.0.0",
    "mkdocs-section-index>=0.3.0",
    "mkdocs>=1.0.0",
    "mkdocstrings-python>=1.18.2",
    "mkdocstrings>=0.30.0",
    "pymdown-extensions>=10.19.1",
  ]

  test = [
    "coverage>=7.0.0",
    "pyfakefs>=6.0.0",
    "pyright>=1.0.0",
    "pytest-cov>=7.0.0",
    "pytest-mock>=3.15.1",
    "pytest>=9.0.2",
  ]

# ------------------------------- tool: polylith -------------------------------
[tool.polylith]
  git_tag_pattern = "[0-9]{2}\\.[0-9]{2}\\.[0-9]{2}(?:-.*)?|v[0-9]*"
  namespace       = "${PYPROJECT_NAME}"

  [tool.polylith.structure]
    theme = "loose"

  [tool.polylith.tag.patterns]
    release = "v?[0-9]{1,4}\\.[0-9]{1,2}\\.[0-9]{1,2}(?:\\.[0-9]{1,2})?"
    stable  = "v?[0-9]{1,4}\\.[0-9]{1,2}\\.[0-9]{1,2}(?:\\.[0-9]{1,2})?(?:-.*)?"

  [tool.polylith.resources]
    brick_docs_enabled = false

  [tool.polylith.test]
    enabled = false

# ------------------------------- Build System ---------------------------------
[build-system]
  build-backend = "hatchling.build"
  requires      = [ "hatchling" ]

[tool.hatch.metadata]
  allow-direct-references = true

[tool.hatch.build]
  dev-mode-dirs = [ ".", "bases", "components", "development", "src" ]

# ------------------------------- tool: coverage -------------------------------
[tool.coverage.report]
  skip_empty = "true"

  exclude_also = [
    # ".*\\b(a)?debug_log\\(.*",
    "@abstractmethod",
    "\\.\\.\\.",
    "class .*\\bProtocol\\):",
    "def __repr__",
    "def __str__",
    # "if DEBUG",
    "if TYPE_CHECKING",
    "if __name__ == .__main__.:",
    "msg =.*",
    "raise AssertionError",
    "raise NotImplementedError",
  ]

[tool.coverage.html]
  directory = "_meta/reports/coverage/html"

[tool.coverage.json]
  output = "_meta/reports/coverage/json/coverage.json"

[tool.coverage.xml]
  output = "_meta/reports/coverage/xml/coverage.xml"

# -------------------------------- tool: pytest --------------------------------
[tool.pytest.ini_options]
  addopts = [
    "--cov-report=html",
    "--cov=${PYPROJECT_NAME}",
    "--import-mode=importlib",
    "-s",
    "-vv",
  ]

  python_files = [ "test_*.py" ]
  testpaths    = [ "." ]

  norecursedirs = [
    ".devenv",
    ".direnv",
    ".venv",
    "data",
    "development",
    "projects",
    "submodules",
    "workspaces",
  ]

# ---------------------------------- tool: uv ----------------------------------
[tool.uv]
  compile-bytecode = true
  managed          = true

  [tool.uv.pip]
    compile-bytecode = true

  [tool.uv.workspace]
    members = [  ]

  [tool.uv.sources]
